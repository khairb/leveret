name: Bug Report
description: Report a bug in Scout
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        URL: https://example.com
        Task: "Extract product listings"
        Schema:
          {
            "name": "str",
            "price": "float"
          }
        Code:
          ```python
          import scout
          result = scout.extract(url="https://example.com", schema={"name": "str"})
          ```
    validations:
      required: true

  - type: textarea
    id: expected-vs-actual
    attributes:
      label: Expected vs actual behavior
      description: What you expected to happen and what actually happened.
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: Paste any error messages or tracebacks.
      render: shell
    validations:
      required: false

  - type: input
    id: scout-version
    attributes:
      label: Scout version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true
